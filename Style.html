<style>
:root {
  --bg:#061526; --bg2:#0B1F3A; --card:#102A4C; --card2:#14385F;
  --yellow:#FFE600; --yellow2:#F7C600; --text:#F8FAFC; --muted:#AAB7C4;
  --border:rgba(255,255,255,.10); --risk:#FF5C5C; --warn:#FFB020;
  --ok:#2EE59D; --opp:#3BA7FF; --shadow:0 20px 60px rgba(0,0,0,.28);
}
*{box-sizing:border-box} html,body{max-width:100%;overflow-x:hidden} body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text);letter-spacing:0}
button,input,select,textarea{font:inherit} button{border:0;cursor:pointer}
.hidden{display:none!important}.login,.loading{min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 20% 10%,#12365e 0,#061526 38%,#030b14 100%)}
.login-panel{width:min(440px,92vw);padding:34px;border:1px solid var(--border);background:rgba(11,31,58,.78);box-shadow:var(--shadow);border-radius:8px}
.brand-mark{width:54px;height:54px;display:grid;place-items:center;background:var(--yellow);color:#071525;font-weight:900;border-radius:8px}.brand-mark.small{width:34px;height:34px;font-size:12px}
h1,h2,h3{margin:0} .login h1{margin-top:20px;font-size:30px}.login p{color:var(--muted);line-height:1.5}.login-note{font-size:13px;border-left:3px solid var(--yellow);padding-left:10px}.login form{display:flex;gap:10px;margin:26px 0 14px}
input,select,textarea{width:100%;background:#081a2f;color:var(--text);border:1px solid var(--border);border-radius:6px;padding:12px;outline:none}
textarea{min-height:86px;resize:vertical} input:focus,select:focus,textarea:focus{border-color:rgba(255,230,0,.6);box-shadow:0 0 0 3px rgba(255,230,0,.12)}
button{background:var(--yellow);color:#061526;border-radius:6px;padding:12px 14px;font-weight:800;transition:.18s}.ghost{background:transparent;color:var(--text);border:1px solid var(--border)}button:hover{transform:translateY(-1px);background:var(--yellow2)}
small,.sidebar-foot{color:var(--muted);font-size:11px}.loader{width:48px;height:48px;border:4px solid rgba(255,255,255,.12);border-top-color:var(--yellow);border-radius:50%;animation:spin .8s linear infinite}.loader.mini{width:28px;height:28px;border-width:3px}.screen-loading{min-height:220px;display:grid;place-items:center;gap:12px;color:var(--muted)}.loading{gap:14px}.loading-card{width:min(520px,92vw);display:grid;gap:18px;justify-items:start;padding:34px;border:1px solid var(--border);background:rgba(11,31,58,.82);box-shadow:var(--shadow);border-radius:8px}.loading-card .loader{justify-self:center}.loading-card h2{font-size:28px}.loading-card p{margin:0;color:var(--muted);line-height:1.5}.progress-track{width:100%;height:8px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}.progress-fill{height:100%;width:42%;background:linear-gradient(90deg,var(--yellow),var(--opp));border-radius:999px;animation:progress 1.2s ease-in-out infinite}.loading-steps{width:100%;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.loading-steps span{border:1px solid var(--border);border-radius:999px;padding:8px 10px;color:var(--muted);font-size:12px;text-align:center}.loading-steps span.active{color:#061526;background:var(--yellow);border-color:var(--yellow)}.loading-steps span.done{color:var(--ok);border-color:rgba(46,229,157,.35);background:rgba(46,229,157,.08)}.loading span{color:var(--muted);font-size:12px}@keyframes spin{to{transform:rotate(360deg)}}@keyframes progress{0%{transform:translateX(-120%)}50%{transform:translateX(70%)}100%{transform:translateX(240%)}}
.app{min-height:100vh;display:grid;grid-template-columns:260px 1fr}.sidebar{background:linear-gradient(180deg,#081a2f,#061526);border-right:1px solid var(--border);padding:22px;position:sticky;top:0;height:100vh}.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:28px}
nav{display:grid;gap:8px}.nav-btn{display:flex;align-items:center;gap:10px;text-align:left;background:transparent;color:var(--muted);padding:11px;border-radius:6px}.nav-btn.active,.nav-btn:hover{background:rgba(255,255,255,.07);color:var(--text);box-shadow:inset 3px 0 0 var(--yellow)}
.sidebar-foot{position:absolute;bottom:18px;left:22px;right:22px}.main{min-width:0}.topbar{position:sticky;top:0;z-index:5;background:rgba(6,21,38,.86);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:22px 28px}.eyebrow{color:var(--yellow);font-size:12px;text-transform:uppercase;font-weight:800}.top-actions{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:13px}.content{padding:26px;animation:fade .2s ease;position:relative}.content.is-updating:after{content:"";position:fixed;right:28px;bottom:24px;width:18px;height:18px;border:2px solid rgba(255,255,255,.16);border-top-color:var(--yellow);border-radius:50%;animation:spin .7s linear infinite;z-index:20}.content.is-updating{opacity:.72;transition:opacity .18s}.notice{margin:18px 26px 0;padding:12px 14px;border:1px solid rgba(255,176,32,.4);background:rgba(255,176,32,.1);border-radius:6px;color:#ffe1a1}
@keyframes fade{from{opacity:.3;transform:translateY(4px)}to{opacity:1;transform:none}}
.grid{display:grid;gap:14px}.kpi-grid{grid-template-columns:repeat(6,minmax(130px,1fr))}.two{grid-template-columns:1.35fr .8fr}.three{grid-template-columns:repeat(3,1fr)}.compare-grid{grid-template-columns:repeat(auto-fit,minmax(280px,1fr));align-items:stretch}.compare-card{min-height:320px;display:flex;flex-direction:column}.compare-card .grid{margin-top:auto}.card{background:linear-gradient(180deg,var(--card),#0d2440);border:1px solid var(--border);border-radius:8px;padding:16px;box-shadow:0 10px 30px rgba(0,0,0,.14)}.card h3{font-size:14px;margin-bottom:10px}.kpi label,.muted{color:var(--muted);font-size:12px}.kpi strong{display:block;font-size:26px;margin-top:8px}.state{display:inline-flex;padding:5px 8px;border-radius:999px;font-size:12px;font-weight:800}.Saudavel,.Saudável{background:rgba(46,229,157,.12);color:var(--ok)}.Atencao,.Atenção{background:rgba(255,176,32,.14);color:var(--warn)}.Risco{background:rgba(255,92,92,.14);color:var(--risk)}.Oportunidade{background:rgba(59,167,255,.14);color:var(--opp)}
.bars{display:grid;gap:9px}.bar{display:grid;grid-template-columns:120px 1fr 82px;gap:10px;align-items:center;font-size:12px}.track{height:10px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,var(--yellow),var(--opp));border-radius:999px;animation:grow .45s ease}@keyframes grow{from{width:0}}
.table-wrap{overflow:auto;border:1px solid var(--border);border-radius:8px}table{width:100%;border-collapse:collapse;min-width:720px}th,td{text-align:left;border-bottom:1px solid var(--border);padding:11px;font-size:13px}th{color:var(--muted);font-size:12px;background:rgba(255,255,255,.04)}.filters{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:14px}.filter-summary{margin:0 0 14px;color:var(--muted);font-size:13px}.compare-controls{grid-template-columns:repeat(auto-fit,minmax(230px,1fr));align-items:start}.compare-select{display:grid;grid-template-columns:1fr auto;gap:8px}.mini-btn{padding:12px 10px}.actions-row{display:flex;gap:10px;flex-wrap:wrap}.empty{padding:34px;text-align:center;color:var(--muted);border:1px dashed var(--border);border-radius:8px}.query{font-family:Consolas,monospace;color:#d7e7ff;background:#061526;border-radius:6px;padding:12px;overflow:auto;font-size:12px}.mobile-nav,.mobile-only,.mobile-card-list,.more-menu{display:none}
@media(max-width:980px){body{touch-action:manipulation;-webkit-text-size-adjust:100%}button,input,select,textarea{font-size:16px}.app{display:block}.sidebar{display:none}.topbar{padding:20px 16px;align-items:flex-start;gap:12px;min-height:108px}.topbar h2{font-size:32px;line-height:1.08}.eyebrow{font-size:12px;line-height:1.2}.top-actions{flex-direction:column;align-items:flex-end;gap:8px;max-width:42%;justify-content:flex-start}.top-actions span{max-width:122px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14px}.top-actions .ghost{font-size:0;padding:13px 15px;min-width:64px;min-height:46px}.top-actions .ghost:after{content:"Atualizar";font-size:14px}.content{padding:18px 16px 188px;max-width:100vw}.kpi-grid,.two,.three,.filters{grid-template-columns:1fr}.mobile-nav{position:fixed;display:grid;grid-template-columns:repeat(5,1fr);left:0;right:0;bottom:0;background:#081a2f;border-top:1px solid var(--border);z-index:10;min-height:140px;padding-bottom:env(safe-area-inset-bottom)}.mobile-nav .nav-btn{justify-content:center;align-items:center;border-radius:0;padding:32px 4px 28px;font-size:16px;font-weight:900;min-height:132px;line-height:1.15;text-align:center}.mobile-nav .nav-btn.active{box-shadow:inset 0 6px 0 var(--yellow);color:var(--text)}.more-menu{position:fixed;display:grid;gap:8px;right:10px;bottom:148px;width:min(320px,calc(100vw - 20px));padding:12px;background:#081a2f;border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow);z-index:11}.more-menu.hidden{display:none!important}.more-menu button{background:transparent;color:var(--text);border:1px solid var(--border);text-align:left;min-height:52px}.login form{display:grid}.bar{grid-template-columns:82px 1fr 58px}.desktop-table{display:none}.mobile-card-list{display:grid;gap:10px}.mobile-data-card{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:14px}.mobile-data-card h4{margin:0 0 10px;font-size:15px}.mobile-data-card p{display:flex;justify-content:space-between;gap:12px;margin:8px 0;color:var(--muted);font-size:12px}.mobile-data-card strong{color:var(--text);text-align:right}.mobile-only{display:block;width:100%;margin-bottom:10px}.action-form-panel{display:none}.action-form-panel.open{display:block}.recommendations .card,.three .card{padding:14px}.compare-card{min-height:0}.compare-select{grid-template-columns:1fr}.table-wrap{max-width:100%;overflow-x:auto}}
</style>
